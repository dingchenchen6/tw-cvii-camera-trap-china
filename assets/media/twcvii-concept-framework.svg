<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">TW-CVII concept framework</title>
  <desc id="desc">Historical expectations, contemporary camera-trap evidence, survey adequacy, and weighting layers feed into evidence states and intactness outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f8f3"/>
      <stop offset="0.55" stop-color="#eef4f2"/>
      <stop offset="1" stop-color="#f8f5ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#14261f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#35594e"/>
    </marker>
    <style>
      .title { font: 800 32px Inter, Arial, sans-serif; fill: #143a2d; }
      .subtitle { font: 600 14px Inter, Arial, sans-serif; fill: #5d6b63; }
      .label { font: 800 17px Inter, Arial, sans-serif; fill: #1f2933; }
      .small { font: 600 12px Inter, Arial, sans-serif; fill: #56665f; }
      .tiny { font: 700 11px Inter, Arial, sans-serif; fill: #35594e; }
      .box { stroke: #d6dfd7; stroke-width: 1.4; rx: 10; filter: url(#shadow); }
      .line { stroke: #35594e; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="58" y="62" class="title">Threat-weighted Camera-trap Vertebrate Intactness Index</text>
  <text x="60" y="90" class="subtitle">A source-audited framework for separating persistence, silent range, and monitoring gaps in Chinese camera-trap literature.</text>

  <g transform="translate(58 135)">
    <rect class="box" x="0" y="0" width="225" height="160" fill="#ffffff"/>
    <text x="22" y="38" class="label">Historical baseline</text>
    <text x="22" y="72" class="small">Range maps</text>
    <text x="22" y="98" class="small">Museum and literature records</text>
    <text x="22" y="124" class="small">Local checklist expectation</text>
    <circle cx="188" cy="43" r="18" fill="#dfece5"/>
    <text x="181" y="48" class="tiny">H</text>
  </g>

  <g transform="translate(330 135)">
    <rect class="box" x="0" y="0" width="225" height="160" fill="#ffffff"/>
    <text x="22" y="38" class="label">Camera evidence</text>
    <text x="22" y="72" class="small">Species inventory</text>
    <text x="22" y="98" class="small">Independent events and RAI</text>
    <text x="22" y="124" class="small">Appendix and media audit</text>
    <circle cx="188" cy="43" r="18" fill="#dceff2"/>
    <text x="181" y="48" class="tiny">C</text>
  </g>

  <g transform="translate(602 135)">
    <rect class="box" x="0" y="0" width="225" height="160" fill="#ffffff"/>
    <text x="22" y="38" class="label">Survey adequacy</text>
    <text x="22" y="72" class="small">Camera-days and stations</text>
    <text x="22" y="98" class="small">Seasonal coverage</text>
    <text x="22" y="124" class="small">Detection threshold by guild</text>
    <circle cx="188" cy="43" r="18" fill="#faefd6"/>
    <text x="181" y="48" class="tiny">E</text>
  </g>

  <g transform="translate(874 135)">
    <rect class="box" x="0" y="0" width="250" height="160" fill="#ffffff"/>
    <text x="22" y="38" class="label">Weighting layers</text>
    <text x="22" y="72" class="small">Red List and protection status</text>
    <text x="22" y="98" class="small">Functional traits and body size</text>
    <text x="22" y="124" class="small">Abundance proxy sensitivity</text>
    <circle cx="210" cy="43" r="18" fill="#f2e0d8"/>
    <text x="203" y="48" class="tiny">W</text>
  </g>

  <path class="line" d="M285 215 H328"/>
  <path class="line" d="M557 215 H600"/>
  <path class="line" d="M829 215 H872"/>

  <g transform="translate(105 365)">
    <rect class="box" x="0" y="0" width="205" height="125" fill="#f8fbfa"/>
    <text x="20" y="35" class="label">Confirmed</text>
    <text x="20" y="60" class="label">persistence</text>
    <text x="20" y="94" class="small">Expected and detected</text>
  </g>
  <g transform="translate(360 365)">
    <rect class="box" x="0" y="0" width="205" height="125" fill="#fff7ef"/>
    <text x="20" y="35" class="label">Silent range</text>
    <text x="20" y="68" class="small">Expected, not detected,</text>
    <text x="20" y="92" class="small">adequately surveyed</text>
  </g>
  <g transform="translate(615 365)">
    <rect class="box" x="0" y="0" width="205" height="125" fill="#fffbed"/>
    <text x="20" y="35" class="label">Monitoring gap</text>
    <text x="20" y="68" class="small">Expected, no detection,</text>
    <text x="20" y="92" class="small">survey insufficient</text>
  </g>
  <g transform="translate(870 365)">
    <rect class="box" x="0" y="0" width="205" height="125" fill="#f2f7e8"/>
    <text x="20" y="35" class="label">New occurrence</text>
    <text x="20" y="68" class="small">Detected beyond</text>
    <text x="20" y="92" class="small">historical expectation</text>
  </g>

  <path class="line" d="M600 305 C600 330 208 330 208 363"/>
  <path class="line" d="M600 305 C600 330 462 330 462 363"/>
  <path class="line" d="M600 305 C600 330 718 330 718 363"/>
  <path class="line" d="M600 305 C600 330 972 330 972 363"/>

  <g transform="translate(235 555)">
    <rect x="0" y="0" width="730" height="64" rx="12" fill="#143a2d"/>
    <text x="28" y="39" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="850" fill="#ffffff">Outputs: species intactness, detection-corrected intactness, threat-weighted intactness, functional intactness, and monitoring priority</text>
  </g>
</svg>
