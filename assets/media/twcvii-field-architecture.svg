<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">TW-CVII camera-trap database field architecture</title>
  <desc id="desc">A relational field architecture showing literature source, study, site, deployment, observation, species, traits, historical expectation, evidence state, and derived indices.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfcfa"/>
      <stop offset="1" stop-color="#edf3ee"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#244f45"/>
    </marker>
    <style>
      .title { font: 850 32px Inter, Arial, sans-serif; fill: #143a2d; }
      .subtitle { font: 600 14px Inter, Arial, sans-serif; fill: #5d6b63; }
      .head { font: 850 16px Inter, Arial, sans-serif; fill: #1f2933; }
      .small { font: 600 12px Inter, Arial, sans-serif; fill: #5d6b63; }
      .tiny { font: 750 11px Inter, Arial, sans-serif; fill: #143a2d; }
      .tiny-light { font: 750 11px Inter, Arial, sans-serif; fill: #dcece4; }
      .box { fill: #ffffff; stroke: #d6dfd7; stroke-width: 1.2; rx: 10; }
      .link { stroke: #244f45; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="58" y="62" class="title">Normalized Camera-trap Database Architecture</text>
  <text x="60" y="90" class="subtitle">PREDICTS/DiVert ecological hierarchy plus Camtrap DP deployment logic and TW-CVII evidence-state layers.</text>

  <g transform="translate(70 140)">
    <rect class="box" width="190" height="96"/>
    <text x="20" y="34" class="head">source</text>
    <text x="20" y="58" class="small">title, authors, DOI,</text>
    <text x="20" y="77" class="small">language, search batch</text>
  </g>
  <g transform="translate(310 140)">
    <rect class="box" width="190" height="96"/>
    <text x="20" y="34" class="head">study</text>
    <text x="20" y="58" class="small">objective, taxa, design,</text>
    <text x="20" y="77" class="small">camera effort totals</text>
  </g>
  <g transform="translate(550 140)">
    <rect class="box" width="190" height="96"/>
    <text x="20" y="34" class="head">site</text>
    <text x="20" y="58" class="small">place name, PA status,</text>
    <text x="20" y="77" class="small">lat/lon, area, habitat</text>
  </g>
  <g transform="translate(790 140)">
    <rect class="box" width="190" height="96"/>
    <text x="20" y="34" class="head">deployment</text>
    <text x="20" y="58" class="small">camera station, dates,</text>
    <text x="20" y="77" class="small">model, checks, failures</text>
  </g>

  <g transform="translate(190 315)">
    <rect class="box" width="190" height="96"/>
    <text x="20" y="34" class="head">media / observation</text>
    <text x="20" y="58" class="small">image/video events,</text>
    <text x="20" y="77" class="small">timestamps, species ID</text>
  </g>
  <g transform="translate(430 315)">
    <rect class="box" width="190" height="96"/>
    <text x="20" y="34" class="head">species measurement</text>
    <text x="20" y="58" class="small">inventory, detections,</text>
    <text x="20" y="77" class="small">RAI, occupancy, density</text>
  </g>
  <g transform="translate(670 315)">
    <rect class="box" width="190" height="96"/>
    <text x="20" y="34" class="head">traits and status</text>
    <text x="20" y="58" class="small">taxonomy, Red List,</text>
    <text x="20" y="77" class="small">body size, trophic guild</text>
  </g>

  <g transform="translate(70 500)">
    <rect class="box" width="214" height="96" fill="#fff7ef"/>
    <text x="20" y="34" class="head">historical expectation</text>
    <text x="20" y="58" class="small">range baseline and</text>
    <text x="20" y="77" class="small">reference scenario</text>
  </g>
  <g transform="translate(344 500)">
    <rect class="box" width="214" height="96" fill="#fffbed"/>
    <text x="20" y="34" class="head">survey adequacy</text>
    <text x="20" y="58" class="small">guild threshold, camera</text>
    <text x="20" y="77" class="small">days, spatial coverage</text>
  </g>
  <g transform="translate(618 500)">
    <rect class="box" width="214" height="96" fill="#f8fbfa"/>
    <text x="20" y="34" class="head">evidence state</text>
    <text x="20" y="58" class="small">confirmed, silent range,</text>
    <text x="20" y="77" class="small">monitoring gap, new</text>
  </g>
  <g transform="translate(892 500)">
    <rect class="box" width="214" height="96" fill="#f2f7e8"/>
    <text x="20" y="34" class="head">derived index</text>
    <text x="20" y="58" class="small">species, threat-weighted,</text>
    <text x="20" y="77" class="small">functional intactness</text>
  </g>

  <path class="link" d="M260 188 H308"/>
  <path class="link" d="M500 188 H548"/>
  <path class="link" d="M740 188 H788"/>
  <path class="link" d="M885 237 C885 276 284 274 284 313"/>
  <path class="link" d="M380 363 H428"/>
  <path class="link" d="M620 363 H668"/>
  <path class="link" d="M526 413 C526 455 177 455 177 498"/>
  <path class="link" d="M526 413 C526 455 451 455 451 498"/>
  <path class="link" d="M765 413 C765 455 725 455 725 498"/>
  <path class="link" d="M832 548 H890"/>

  <g transform="translate(936 298)">
    <rect x="0" y="0" width="184" height="108" rx="10" fill="#143a2d"/>
    <text x="18" y="34" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850" fill="#ffffff">Must-keep spine</text>
    <text x="18" y="61" class="tiny-light">coordinates + precision</text>
    <text x="18" y="80" class="tiny-light">date/time + effort</text>
    <text x="18" y="99" class="tiny-light">citation + field provenance</text>
  </g>
</svg>
